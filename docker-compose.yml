version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bim_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bim_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bim_password}
      POSTGRES_DB: ${POSTGRES_DB:-bim_ai}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bim_user} -d ${POSTGRES_DB:-bim_ai}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bim_ai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  bim-service:
    build:
      context: ./bim-service
      dockerfile: Dockerfile
    container_name: bim_ai_bim_service
    restart: unless-stopped
    profiles:
      - bim
    ports:
      - '8000:8000'
    environment:
      - ENVIRONMENT=development
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

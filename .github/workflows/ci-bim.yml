name: CI — BIM Service

on:
  push:
    branches: [develop, main]
    paths:
      - 'bim-service/**'
      - '.github/workflows/ci-bim.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'bim-service/**'
      - '.github/workflows/ci-bim.yml'

defaults:
  run:
    working-directory: bim-service

jobs:
  test:
    name: Pytest + Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bim-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: test
          AWS_S3_BUCKET: bim-ai-models-test
          AWS_REGION: eu-west-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: eu-west-1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./bim-service
          push: false
          tags: bim-ai/bim-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

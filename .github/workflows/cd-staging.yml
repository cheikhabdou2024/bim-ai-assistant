name: CD — Build, Push ECR & Deploy ECS (Staging)

on:
  push:
    branches: [develop]

env:
  AWS_REGION: eu-west-1

jobs:
  # ── Backend: Build → Push ECR → Deploy ECS ───────────────────────────────
  deploy-backend:
    name: Backend — ECR + ECS
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE_TAG="sha-${{ github.sha }}"
          IMAGE_URI="${ECR_REGISTRY}/${{ secrets.ECR_BACKEND_REPO }}:${IMAGE_TAG}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_BACKEND_REPO }}:develop
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Scan image for vulnerabilities (ECR)
        run: |
          aws ecr wait image-scan-complete \
            --repository-name "${{ secrets.ECR_BACKEND_REPO }}" \
            --image-id imageTag="sha-${{ github.sha }}" \
            --region "${{ env.AWS_REGION }}" || true  # Non-bloquant en staging

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.ECS_TASK_BACKEND }}" \
            --query taskDefinition \
            --region "${{ env.AWS_REGION }}" \
            > task-def-backend.json

      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-backend.json
          container-name: backend
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_BACKEND }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── BIM Service: Build → Push ECR → Deploy ECS ───────────────────────────
  deploy-bim:
    name: BIM Service — ECR + ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push BIM service to ECR
        id: build-bim
        uses: docker/build-push-action@v5
        with:
          context: ./bim-service
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_BIM_REPO }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_BIM_REPO }}:develop
          cache-from: type=gha,scope=bim
          cache-to: type=gha,mode=max,scope=bim

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.ECS_TASK_BIM }}" \
            --query taskDefinition \
            --region "${{ env.AWS_REGION }}" \
            > task-def-bim.json

      - name: Render new task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-bim.json
          container-name: bim-service
          image: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_BIM_REPO }}:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_BIM }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Frontend: Build → S3 → CloudFront invalidation ───────────────────────
  deploy-frontend:
    name: Frontend — S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ \
            "s3://${{ secrets.S3_FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "index.html"

          # index.html : no-cache (SPA entry point — toujours frais)
          aws s3 cp frontend/dist/index.html \
            "s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)
          echo "CloudFront invalidation created: ${INVALIDATION_ID}"

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-bim, deploy-frontend]
    if: always()

    steps:
      - name: Report
        run: |
          echo "## Deployment to Staging — $(date -u)"
          echo ""
          echo "| Service | Status |"
          echo "|---------|--------|"
          echo "| Backend (ECS Fargate) | ${{ needs.deploy-backend.result }} |"
          echo "| BIM Service (ECS Fargate) | ${{ needs.deploy-bim.result }} |"
          echo "| Frontend (S3 + CloudFront) | ${{ needs.deploy-frontend.result }} |"
          echo ""
          echo "Commit: \`${{ github.sha }}\`"
          echo "Triggered by: ${{ github.actor }}"

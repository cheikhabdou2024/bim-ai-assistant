name: CI — Backend

on:
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bim_user
          POSTGRES_PASSWORD: bim_password
          POSTGRES_DB: bim_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_test

      - name: Push database schema (no migrations yet)
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_test

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ''
          JWT_SECRET: ci-test-secret-32chars-minimum!!
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-ci-mock-key-not-real
          BIM_SERVICE_URL: http://localhost:8000

      - name: Integration tests (Supertest TC-020→TC-035 + TC-056→TC-060)
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ''
          JWT_SECRET: ci-test-secret-32chars-minimum!!
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          NODE_ENV: test
          ANTHROPIC_API_KEY: sk-ant-ci-mock-key-not-real
          BIM_SERVICE_URL: http://localhost:8000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_test

      - name: Build NestJS
        run: npm run build

      - name: Verify dist exists
        run: test -f dist/main.js && echo "Build OK" || exit 1

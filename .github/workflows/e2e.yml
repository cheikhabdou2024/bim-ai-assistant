name: E2E — Playwright Auth

on:
  # E2E runs POST-MERGE only — does NOT block PRs
  # PRs are gated by ci-backend + ci-frontend + ci-bim only
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bim_user
          POSTGRES_PASSWORD: bim_password
          POSTGRES_DB: bim_ai_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      # --- Backend setup ---
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_e2e

      - name: Push database schema + seed
        working-directory: backend
        run: |
          npx prisma db push --force-reset --accept-data-loss
          npx prisma db seed
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_e2e

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: node dist/main.js &
        env:
          DATABASE_URL: postgresql://bim_user:bim_password@localhost:5432/bim_ai_e2e
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ''
          JWT_SECRET: e2e-test-secret-32chars-minimum!!!!
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_DAYS: 7
          NODE_ENV: test
          PORT: 3000
          FRONTEND_URL: http://localhost:5173
          ANTHROPIC_API_KEY: sk-ant-ci-mock-key-not-real
          BIM_SERVICE_URL: http://localhost:8000
          AWS_REGION: eu-west-1
          AWS_S3_BUCKET: bim-ai-models-test

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000/api/health && exit 0
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "ERROR: Backend failed to start after 60s"
          exit 1

      # --- Frontend setup ---
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Start frontend (preview)
        working-directory: frontend
        run: npm run preview -- --port 5173 &

      - name: Wait for frontend
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:5173 && break
            echo "Waiting for frontend... ($i)"
            sleep 2
          done

      # --- Playwright ---
      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

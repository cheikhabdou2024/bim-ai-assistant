name: CI — Terraform Validate

on:
  push:
    branches: [develop, main]
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'

defaults:
  run:
    working-directory: infra

jobs:
  validate:
    name: Terraform Validate + Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: infra/.terraform-version

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init (without backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Check for hardcoded secrets
        run: |
          # Refuse si des credentials AWS ou mots de passe sont en dur
          if grep -rE "(AKIA[A-Z0-9]{16}|sk-ant-|password\s*=\s*\"[^$\{])" . --include="*.tf" --exclude-dir=".terraform"; then
            echo "❌ Potential hardcoded secret found in .tf files"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
